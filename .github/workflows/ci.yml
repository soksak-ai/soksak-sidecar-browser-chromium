# CI 검증 — 발행하지 않는다(release.yml 이 발행 소유). push/PR 마다 다섯 플랫폼 타깃에서
# cargo build(링크까지)로 CEF 임베딩·presenter(per-OS)·wgpu import 가 실제로 컴파일·링크되는지
# 검증한다. cargo check 는 링크를 건너뛰어 CEF import-lib(windows)·libcef.so(linux) 링크 결함을
# 놓치므로 반드시 build 로 검증한다. cef-dll-sys 빌드 스크립트가 타깃별 CEF 배포판을 자동 내려받아
# 링크하므로(로컬 산출물로 실측 확인) 별도 CEF_PATH·export 단계가 필요 없다.
# Linux 의존성은 cef-rs 자체 CI(rust.yml)와 동형 — OSR windowless 라 GTK 윈도잉이 아니라 glib 만 링크한다.
name: ci

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-15
          - target: x86_64-apple-darwin
            runner: macos-15-intel
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
          - target: x86_64-pc-windows-msvc
            runner: windows-2025
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: "1.96.0"
          targets: ${{ matrix.target }}
      - name: Install the Linux CEF link dependency
        if: runner.os == 'Linux'
        run: sudo apt-get update -q && sudo apt-get install -yq libglib2.0-dev
      - name: Build and link the sidecar for this target
        # cef 크레이트가 이 타깃의 CEF 배포판을 자동 내려받아 링크한다. build(check 아님)라야
        # windows import-lib·linux libcef.so 링크가 실제로 걸린다. harness 바이너리는
        # required-features 라 기본 빌드에서 제외 — dylib+helper 만 링크한다.
        run: cargo build --release --target ${{ matrix.target }} --verbose
