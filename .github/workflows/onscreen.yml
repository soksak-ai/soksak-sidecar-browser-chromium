# 온스크린 런타임 검증 — Linux 에서 하니스를 xvfb + 소프트웨어 Vulkan(lavapipe)로 구동해, 프레젠터의
# present 경로가 실제 프레임을 낸다는 것을 증명한다(컴파일이 아니라 런타임). CI/lavapipe 엔 하드웨어
# DMA-BUF 가 없어 CEF 가 on_paint(CPU) 로 폴백하고, present_cpu 가 프레임을 낸다. 하니스는 오프스크린
# 브라우저를 만들고 매 프레임 엔진을 tick 한 뒤 stats.dbg.framesPresented > 0 + 라운드트립/입력을 단언한다
# (PASS=exit 0). 엔진은 no_sandbox=1 이라 CI 에서 setuid 샌드박스가 필요 없다.
name: onscreen

on:
  push:
  pull_request:

concurrency:
  group: onscreen-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  linux-xvfb:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: "1.96.0"
      - name: Install CEF link/runtime deps, xvfb and software Vulkan (lavapipe)
        run: |
          sudo apt-get update -q
          sudo apt-get install -yq \
            libglib2.0-dev xvfb mesa-vulkan-drivers libvulkan1 vulkan-tools \
            libnss3 libnspr4 libgbm1 libgl1-mesa-dri \
            libx11-6 libxext6 libxrender1 libxcomposite1 libxdamage1 libxrandr2 \
            libxi6 libxtst6 libxkbcommon0 libxkbcommon-x11-0 libxfixes3 libxcb1 \
            libasound2t64 libatk1.0-0t64 libatk-bridge2.0-0t64 libcups2t64 \
            libpango-1.0-0 libcairo2
      - name: Build the harness and the CEF subprocess helper
        run: cargo build --release --features harness
      - name: Stage the Linux dist (libcef.so + CEF resources + helper)
        run: ./stage.sh "$PWD/dist"
      - name: Run the harness offscreen under xvfb + lavapipe and assert frames
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/dist
          WINIT_UNIX_BACKEND: x11
          VK_ICD_FILENAMES: /usr/share/vulkan/icd.d/lvp_icd.json
          SOKSAK_SIDECAR_BROWSER_CHROMIUM_NO_TICK: "0"
        run: |
          echo "== vulkan ICDs =="; ls -la /usr/share/vulkan/icd.d/ || true
          xvfb-run -a --server-args="-screen 0 1280x1024x24" \
            ./target/release/harness "$PWD/dist" offscreen

  windows-onscreen:
    runs-on: windows-2025
    # 현재까지: 컴파일·스테이징·present(DX12/WARP 로 프레임 렌더)·cefQuery 라운드트립은 통과하고,
    # 입력 상태기계(클릭→포커스)에서 멈춘다 — windowless CEF 입력이 Windows 에서 다르게 동작하는 별개
    # 이슈(입력 포워딩 코드는 macOS·Linux 런타임에서 검증된 플랫폼-중립 경로다). present 검증 신호를
    # 잃지 않도록 job 은 계속 돌리되, 입력 라운드트립이 고쳐질 때까지 워크플로우를 hard-fail 시키지 않는다.
    continue-on-error: true
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: "1.96.0"
      - name: Point Cargo at a short target dir (CEF C++ wrapper crosses MAX_PATH otherwise)
        run: Add-Content -Path $env:GITHUB_ENV -Value "CARGO_TARGET_DIR=D:/t"
      - name: Build the harness and the CEF subprocess helper
        run: cargo build --release --features harness
      - name: Stage the Windows dist (libcef.dll + CEF resources + helper.exe)
        shell: bash
        run: ./stage.sh "$PWD/dist"
      - name: Run the harness offscreen and assert frames
        shell: bash
        # Windows runners have a desktop session (no xvfb needed); wgpu uses the DX12 WARP
        # software adapter when there is no GPU. libcef.dll must be on PATH next to the process.
        run: |
          export PATH="$PWD/dist:$PATH"
          "$CARGO_TARGET_DIR/release/harness.exe" "$PWD/dist" offscreen
